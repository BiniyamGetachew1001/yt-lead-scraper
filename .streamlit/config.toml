[theme]
base            = "dark"
primaryColor    = "#ff4b4b"
backgroundColor = "#0e1117"
secondaryBackgroundColor = "#1a1d27"
textColor       = "#e8eaf0"
font            = "monospace"

[server]
headless        = true
enableCORS      = false
enableXsrfProtection = true
maxUploadSize   = 10

[browser]
gatherUsageStats = false
